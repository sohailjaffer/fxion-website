<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex" />
  <title>Email Confirmed — Grocily</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background: #ffffff;
      color: #0F172A;
      display: flex;
      min-height: 100vh;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card { max-width: 420px; text-align: center; }
    .badge {
      width: 88px; height: 88px; border-radius: 50%;
      background: #22C55E;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 28px;
    }
    .badge svg { width: 46px; height: 46px; }
    h1 { font-size: 28px; font-weight: 800; margin: 0 0 12px; letter-spacing: -0.5px; }
    p { font-size: 16px; line-height: 1.55; color: #64748B; margin: 0 0 8px; }
    .hint { font-size: 14px; color: #94A3B8; margin-top: 24px; }
  </style>
</head>
<body>
  <main class="card">
    <div class="badge">
      <svg viewBox="0 0 24 24" fill="none">
        <path d="M5 13l4 4L19 7" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <h1>Email confirmed</h1>
    <p>Your Grocily account is verified.</p>
    <p>Open the <strong>Grocily</strong> app and sign in to start saving on your shop.</p>
    <p class="hint">If Grocily is installed, it should have opened automatically.</p>
  </main>
</body>
</html>
